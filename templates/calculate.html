<!DOCTYPE html>
<html>
<head><title>次方與根號計算</title></head>
<body>
    <h2>次方與根號計算</h2>
    <form method="POST">
        x: <input type="number" name="x" required> <br><br>
        運算：
        <select name="opt">
            <option value="∧">∧ (次方)</option>
            <option value="√">√ (根號)</option>
        </select> <br><br>
        y: <input type="number" name="y" required> <br><br>
        <button type="submit">計算</button>
    </form>

</body>
